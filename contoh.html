      window.speechSynthesis.speak(message);
    }
    function audioButton(text){
      const safe=String(text).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return `<button onclick="speakText('${safe}')" aria-label="Bacakan pertanyaan" style="background:var(--yellow);border:none;width:44px;height:44px;border-radius:50%;cursor:pointer;margin-left:16px;box-shadow:0 4px 0 #B28400;flex-shrink:0;color:#5A3F00;font-size:1.05rem">🔊</button>`;
    }
    function setAge(age){state.age=age;document.getElementById('age-younger').classList.toggle('active',age==='9-11');document.getElementById('age-older').classList.toggle('active',age==='12-15');render()}
    function add(id){if(state.selected.includes(id))return;state.selected.push(id);state.hasRun=false;state.checks=[];render()}
    function chooseMcq(index){state.choice=index;render()}
    function openImageZoom(src,alt){
      const overlay=document.createElement('div');
      overlay.className='image-zoom-overlay';
      overlay.setAttribute('role','dialog');
      overlay.setAttribute('aria-modal','true');
      overlay.setAttribute('aria-label','Pratinjau gambar diperbesar');
      overlay.innerHTML=`<button class="image-zoom-close" type="button" aria-label="Tutup gambar">×</button><img src="${src}" alt="${alt}">`;
      overlay.addEventListener('click',event=>{if(event.target===overlay||event.target.closest('.image-zoom-close'))closeImageZoom()});
      document.body.appendChild(overlay);
      document.body.style.overflow='hidden';
      overlay.querySelector('.image-zoom-close').focus();
    }
    function closeImageZoom(){
      document.querySelector('.image-zoom-overlay')?.remove();
      document.body.style.overflow='';
    }
    document.addEventListener('keydown',event=>{if(event.key==='Escape')closeImageZoom()});
    function removeAt(i){state.selected.splice(i,1);state.hasRun=false;state.checks=[];render()}
    function resetMission(){state.selected=[];state.choice=null;state.hasRun=false;state.checks=[];state.revealedMcqQuestionId=null;render()}
    function revealMcqQuestion(questionId){state.revealedMcqQuestionId=questionId;render()}
    function evaluate(m){
      const hasRequired=m.required.map(id=>state.selected.includes(id));
      const clean=!m.forbidden.some(id=>state.selected.includes(id));
      const selectedRequired=state.selected.filter(id=>m.required.includes(id));
      const orderOk=!m.ordered||m.required.every((id,i)=>selectedRequired[i]===id);
      const efficient=state.selected.length<=m.max;
      const allRequired=hasRequired.every(Boolean);
      const base=[allRequired,clean,orderOk,efficient];
      return m.constraints.map((label,i)=>({label,pass:base[i] ?? (allRequired&&clean&&orderOk&&efficient)}));
    }
    function notifyParent(type,payload={}){
      window.postMessage({type,payload},'*');

        selectedPillars:[...selectedPillars],

        index:state.index,
        scores:{...state.scores},
        submitted:{...state.submitted},
        answerTrail:[...state.answerTrail],
        attempts:[...state.attempts],
        updatedAt:new Date().toISOString()
      };
    }
    function runMission(){
      const m=missions[state.index];
      state.checks=evaluate(m);state.hasRun=true;
      state.attempts.push({
        questionId:m.id,pillar:m.pillar,interactionType:m.engine,
        submittedValue:[...state.selected],validationChecks:state.checks.map(check=>({...check})),
        correct:state.checks.every(x=>x.pass),attemptedAt:new Date().toISOString(),technicalError:false
      });

    }
    function submitMission(){
      const m=missions[state.index];if(!state.hasRun||!state.checks.every(x=>x.pass))return;
      if(!state.submitted[m.id]){
        state.submitted[m.id]=true;state.scores[m.pillar]++;
        state.answerTrail.push({
          questionId:m.id,pillar:m.pillar,difficulty:m.difficulty,interactionType:m.engine,
          submittedValue:[...state.selected],validationChecks:state.checks.map(check=>({...check})),
          firstSubmissionCorrect:state.attempts.filter(attempt=>attempt.questionId===m.id)[0]?.correct===true,
          correct:true,submittedAt:new Date().toISOString(),technicalError:false
        });
      }
      if(state.index<missions.length-1){state.index++;resetMission()}else{state.index=missions.length;render()}
      notifyParent('kalananti-stage1b-progress',progressPayload());
    }
    function submitMcq(){
      const m=missions[state.index];if(!m.mcq||state.choice===null)return;
      if(!state.submitted[m.id]){

        const evidence={
          questionId:m.id,pillar:m.pillar,difficulty:m.difficulty,interactionType:'multiple_choice',
          submittedValue:state.choice,correct,firstSubmissionCorrect:correct,
          submittedAt:new Date().toISOString(),technicalError:false
        };
        state.attempts.push({...evidence,attemptedAt:evidence.submittedAt});
        state.answerTrail.push(evidence);
      }
      if(state.index<missions.length-1){state.index++;resetMission()}else{state.index=missions.length;render()}
      notifyParent('kalananti-stage1b-progress',progressPayload());
    }
    function move(delta){const next=Math.max(0,Math.min(missions.length-1,state.index+delta));if(next!==state.index){state.index=next;resetMission()}}
    function toast(text){const old=document.querySelector('.toast');if(old)old.remove();const el=document.createElement('div');el.className='toast';el.textContent=text;document.body.appendChild(el);setTimeout(()=>el.remove(),2600)}
    function render(){
      if (window._sortingTimer1B) {
        clearTimeout(window._sortingTimer1B);
        window._sortingTimer1B = null;
      }
      if(state.index>=missions.length){renderFinish();return}
      const m=missions[state.index],p=PILLARS[m.pillar],progress=((state.index+1)/missions.length)*100;
      const isMcq=!!m.mcq;

      if (!isMcq) {
        window._sortingTimer1B = setTimeout(() => {
          alert('Waktu habis untuk soal ini! Lanjut ke soal berikutnya.');
          if(state.index<missions.length-1){state.index++;resetMission()}else{state.index=missions.length;render()}
        }, 120000);
      }

      const stageProgress=`
        <div class="progress-container">
          <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
          <div class="progress-text"><span>Stage 1B: ${p[0]}</span><span>${state.index+1} / ${missions.length}</span></div>
        </div>`;
      if(isMcq){
        const isReverseCodeMemory=m.mcq.code==='F.06';
        const isImageMemory=m.mcq.code==='F.05';
        if(isReverseCodeMemory&&state.revealedMcqQuestionId!==m.id){
          app.innerHTML=`
            ${stageProgress}
            <div class="badges"><span class="badge pillar">${p[1]} ${p[0]}</span><span class="badge difficulty">Kesulitan ${m.difficulty}/5</span><span class="badge engine">Hafalkan Kode</span></div>
            <div style="max-width:720px;margin:20px auto 0;text-align:center">
              <h2 style="font-size:1.35rem;margin-bottom:8px">Perhatikan peti dan hafalkan kodenya!</h2>
              <p style="color:var(--muted);font-weight:700;margin-bottom:18px">Kode ini akan hilang saat soal ditampilkan.</p>
              <img class="original-mcq-image" src="${m.image}" alt="Peti berkunci" style="max-height:280px">
              <div aria-label="Kode enam empat delapan tujuh tiga nol" style="font-family:'Orbitron',sans-serif;font-size:clamp(2rem,7vw,4.25rem);font-weight:900;letter-spacing:.22em;color:var(--blue2);background:rgba(38,94,155,.06);border:2px dashed rgba(38,94,155,.28);border-radius:20px;padding:18px 16px 18px 28px;margin:18px 0">6 4 8 7 3 0</div>
              <button class="btn-main" onclick="revealMcqQuestion('${m.id}')">Saya Sudah Hafal →</button>
            </div>`;
          return;
        }
        if(isImageMemory&&state.revealedMcqQuestionId!==m.id){
          app.innerHTML=`
            ${stageProgress}
            <div class="badges"><span class="badge pillar">${p[1]} ${p[0]}</span><span class="badge difficulty">Kesulitan ${m.difficulty}/5</span><span class="badge engine">Hafalkan Gambar</span></div>
            <div style="max-width:720px;margin:20px auto 0;text-align:center">
              <h2 style="font-size:1.35rem;margin-bottom:8px">Perhatikan gambar dan hafalkan detailnya!</h2>
              <p style="color:var(--muted);font-weight:700;margin-bottom:18px">Gambar ini akan hilang saat soal ditampilkan.</p>
              <img class="original-mcq-image zoomable" src="${m.image}" alt="Gambar soal" style="max-height:350px; cursor:zoom-in;" onclick="openImageZoom('${m.image}', 'Gambar soal')">
              <div style="margin:24px 0"></div>
              <button class="btn-main" onclick="revealMcqQuestion('${m.id}')">Saya Sudah Hafal →</button>
            </div>`;
          return;
        }
        const mcqOptions=m.mcq.options.map((opt,i)=>{const data=typeof opt==='string'?{text:opt}:opt;return `<button class="option-btn mcq-option ${data.image?'has-image':''} ${state.choice===i?'selected':''}" onclick="chooseMcq(${i})"><span class="mcq-letter">${String.fromCharCode(65+i)}</span>${data.text?`<span>${data.text}</span>`:''}${data.image?`<img src="${data.image}" alt="Pilihan ${String.fromCharCode(65+i)}">`:''}</button>`}).join('');
        app.innerHTML=`
          <div class="kids-assessment-layout">
            <section class="kids-prompt-pane">
              ${stageProgress}
              <div class="badges"><span class="badge pillar">${p[1]} ${p[0]}</span><span class="badge difficulty">Kesulitan ${m.difficulty}/5</span><span class="badge engine">Pilihan Ganda</span></div>
              <span class="source-ref">Sumber: ${m.source}</span>
              ${m.mcq.observation&&!isReverseCodeMemory?`<div class="original-mcq-observation">${m.mcq.observation}</div>`:''}
              <div class="question-text" style="display:flex;align-items:center;justify-content:space-between"><span>${m.mcq.question}</span>${audioButton(m.mcq.question)}</div>
            </section>
            <section class="kids-task-pane">
              ${(m.image && m.mcq.code !== 'F.05')?`<img class="original-mcq-image zoomable" src="${m.image}" alt="Gambar soal ${m.mcq.code}" title="Klik untuk memperbesar" onclick="openImageZoom('${m.image}','Gambar soal ${m.mcq.code}')">`:''}
              ${m.mcq.body?`<div class="original-mcq-body">${m.mcq.body}</div>`:''}
              ${m.mcq.extraImage?`<img class="original-mcq-image original-mcq-extra" src="${m.mcq.extraImage}" alt="Gambar lanjutan soal ${m.mcq.code}">`:''}
              ${m.mcq.after?`<div class="question-text" style="margin-bottom:16px">${m.mcq.after}</div>`:''}
              <div class="mcq-options">${mcqOptions}</div>
              <button class="btn-main" onclick="submitMcq()" ${state.choice===null?'disabled':''}>Kirim Jawaban</button>
            </section>
          </div>`;
        return;
      }
      const selectedCards=state.selected.length?state.selected.map((id,i)=>{const item=m.items.find(x=>x.id===id);return `<div class="selected s1b-v3-selected-card"><span class="num">${i+1}</span><span>${item.icon} ${item.label}</span><button class="remove" aria-label="Hapus ${item.label}" onclick="removeAt(${i})">×</button></div>`}).join(''):`<div class="empty s1b-v3-empty">Klik kartu pada bagian “Kartu Tindakan” sesuai urutan yang diminta.<br>Kartu yang dipilih akan masuk ke sini.</div>`;
      const checks=state.hasRun?state.checks.map(x=>`<li class="${x.pass?'pass':'fail'}">${x.pass?'✓':'×'} ${x.label}</li>`).join(''):m.constraints.map(x=>`<li>○ ${x}</li>`).join('');
      const mcqOptions=isMcq?m.mcq.options.map((opt,i)=>{const data=typeof opt==='string'?{text:opt}:opt;return `<button class="mcq-option ${data.image?'has-image':''} ${state.choice===i?'selected':''}" onclick="chooseMcq(${i})"><span class="mcq-letter">${String.fromCharCode(65+i)}</span>${data.text?`<span>${data.text}</span>`:''}${data.image?`<img src="${data.image}" alt="Pilihan ${String.fromCharCode(65+i)}">`:''}</button>`}).join(''):'';
      app.innerHTML=`
        <div class="kids-assessment-layout">
          <section class="kids-prompt-pane">
            ${stageProgress}
            <div class="badges"><span class="badge pillar">${p[1]} ${p[0]}</span><span class="badge difficulty">Difficulty ${m.difficulty}</span><span class="badge engine">${ENGINES[m.engine]}</span></div>
            <h2>${m.title}</h2><span class="source-ref">Sumber: ${m.source}</span>${m.image?`<img class="source-image zoomable" src="${m.image}" alt="Gambar soal ${m.source}" title="Klik untuk memperbesar" onclick="openImageZoom('${m.image}','Gambar soal ${m.source}')" onerror="this.style.display='none'">`:''}<div class="question-text" style="display:flex;align-items:center;justify-content:space-between"><span>${copy(m)}</span>${audioButton(copy(m))}</div>
            ${isMcq?`<div class="goal"><b>Petunjuk</b><span>Pilih satu jawaban A, B, C, atau D yang paling tepat.</span></div>`:`<div class="goal"><b>Target Mission</b><span>${m.goal}</span></div><div class="constraints"><b>Syarat berhasil</b><ul>${m.constraints.map(x=>`<li>${x}</li>`).join('')}</ul></div>`}
            <div class="legend"><b>${m.id}</b><br>${isMcq?'Format soal asli new_temp.html. Jawaban dicatat satu kali.':'Run hanya memeriksa workspace. Nilai dicatat saat Submit pertama.'}</div>
          </section>
          <section class="kids-task-pane workspace">
            <div class="workspace-head"><h3>${isMcq?'Pilih Jawaban':ENGINES[m.engine]+' Workspace'}</h3><span class="run-status">${isMcq?(state.choice===null?'Belum memilih':`Pilihan ${String.fromCharCode(65+state.choice)}`):(state.hasRun?'Sudah diperiksa':'Belum diperiksa')}</span></div>
            ${isMcq?`<div class="lab"><div class="mcq-options">${mcqOptions}</div></div><div class="actions" style="grid-template-columns:1fr"><button class="submit" onclick="submitMcq()" ${state.choice===null?'disabled':''}>Kirim Jawaban →</button></div>`:`<div class="lab">
              <div class="bank"><div class="lab-label">Kartu tindakan + distractor</div><div class="cards s1b-card-pool">${m.items.map(item=>`<button class="action-card s1b-activity-card ${state.selected.includes(item.id)?'used':''}" onclick="add('${item.id}')"><span class="icon">${item.icon}</span><span>${item.label}</span></button>`).join('')}</div></div>
              <div class="solution"><div class="lab-label">Solusimu ${m.ordered?'· urutan diperiksa':'· kombinasi aturan'}</div><div class="sequence">${selectedCards}</div></div>
              <div class="checks"><div class="lab-label">Hasil validasi</div><ul>${checks}</ul></div>
            </div>
            <div class="actions s1b-v3-actions"><button class="reset pt1-dnd-reset" onclick="resetMission()">Reset</button><button class="run s1b-v3-run" onclick="runMission()" ${state.selected.length?'':'disabled'}>▶ Run / Periksa</button><button class="submit pt1-dnd-submit" onclick="submitMission()" ${state.hasRun&&state.checks.every(x=>x.pass)?'':'disabled'}>Submit →</button></div>`}
          </section>
        </div>`;
    }
    function renderFinish(){
      const payload={...progressPayload(),perfectScore:Object.values(state.scores).reduce((a,b)=>a+b,0)===missions.length,completedAt:new Date().toISOString()};
      app.innerHTML=`<section class="panel finish"><div style="font-size:4rem">🏆</div><h2>Semua Stage 1B selesai</h2><p class="story">Menggabungkan hasil Stage 1A dan Stage 1B...</p><div class="score-grid">${selectedPillars.map(p=>`<div class="score"><span>${PILLARS[p][1]} ${PILLARS[p][0]}</span><strong>${state.scores[p]}/${missions.filter(m=>m.pillar===p).length}</strong></div>`).join('')}</div></section>`;
      notifyParent('kalananti-stage1b-complete',payload);
    }
    window.addEventListener('message',event=>{
      if(!event.data||event.data.type!=='kalananti-stage1b-init')return;
      state.profile=event.data.payload||null;
      const exactAge=Number(state.profile?.student?.exactAge||10);
      state.age=exactAge<=11?'9-11':'12-15';
      configureMissions(state.profile);
      state.index=0;state.selected=[];state.choice=null;state.hasRun=false;state.checks=[];
      state.submitted={};state.scores={logic:0,creativity:0,spatial:0,digital:0};
      state.answerTrail=[];state.attempts=[];state.startedAt=new Date().toISOString();
      render();
      notifyParent('kalananti-stage1b-progress',progressPayload());
    });
    app.innerHTML='<section class="panel finish"><div style="font-size:3rem">🚀</div><h2>Menyiapkan Stage 1B...</h2><p class="story">Memilih dua pilar berdasarkan hasil Stage 1A.</p></section>';
    notifyParent('kalananti-stage1b-ready',{assessmentVersion:'kids-stage1b-codex-v1'});
  <\/script>

<script>
(() => {
  const PENDING_KEY = 'kalananti-kids-flat-pending-v1';
  const returnToController = data => {
    localStorage.setItem(PENDING_KEY, JSON.stringify(data));
    history.replaceState(null,'',localStorage.getItem('kalananti-kids-controller-url-v1'));location.reload();
  };
  window.addEventListener('message', event => {
    if (!event.data) return;
    if (event.data.type === 'kalananti-stage1a-complete' || event.data.type === 'kalananti-stage1b-complete') {
      returnToController(event.data);
    }
    if (event.data.type === 'kalananti-stage1b-ready') {
      const flow = JSON.parse(localStorage.getItem('kalananti-kids-final-placement-v2') || 'null');
      if (flow?._stage1A) window.postMessage({type:'kalananti-stage1b-init', payload:flow._stage1A}, '*');
    }
  });
})();
<\/script>
</body>
</html>

<\/script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root {
            --k-blue: #265E9B;
            --k-blue-d: #1A4576;
            --k-yellow: #F9C013;
            --k-green: #339D9D;
            --bg: #e8f2ff;
            --bg2: #dbeeff;
            --sky: #cfe5ff;
            --nebula1: rgba(38, 94, 155, 0.10);
            --nebula2: rgba(249, 192, 19, 0.10);
            --card: rgba(255, 255, 255, 0.92);
            --card-b: rgba(180, 215, 255, 0.85);
            --text: #1a4576;
            --muted: #4d7daf;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background:
                radial-gradient(circle at 10% 10%, var(--nebula1), transparent 36%),
                radial-gradient(circle at 88% 12%, var(--nebula2), transparent 32%),
                radial-gradient(circle at 50% 105%, rgba(51, 157, 157, 0.14), transparent 34%),
                linear-gradient(160deg, var(--bg) 0%, var(--bg2) 50%, var(--sky) 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
            margin: 0;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -20;
            opacity: 0.12;
            background-image:
                radial-gradient(circle at 14% 24%, rgba(255, 255, 255, 0.9) 0 1px, transparent 1.6px),
                radial-gradient(circle at 78% 68%, rgba(255, 255, 255, 0.75) 0 1px, transparent 1.5px),
                radial-gradient(circle at 56% 38%, rgba(255, 255, 255, 0.60) 0 1px, transparent 1.4px),
                radial-gradient(circle at 30% 82%, rgba(255, 255, 255, 0.50) 0 1px, transparent 1.3px),
                radial-gradient(circle at 90% 45%, rgba(255, 255, 255, 0.55) 0 1px, transparent 1.4px);
            background-size: 250px 250px, 320px 320px, 210px 210px, 290px 290px, 180px 180px;
            animation: starDrift 200s linear infinite;
        }

        @keyframes starDrift { to { transform: translate3d(-120px, 70px, 0); } }

        /* Background elements from kids.html */
        .edge-layer { position: fixed; inset: 0; pointer-events: none; z-index: -10; overflow: hidden; }
        .edge-planet { position: absolute; opacity: 0.55; }
        .char-float { position: absolute; opacity: 0.5; filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.15)); }
        
        @keyframes floatY { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-18px) rotate(2deg); } }
        @keyframes floatY2 { 0%, 100% { transform: translateY(0) rotate(2deg); } 50% { transform: translateY(-14px) rotate(-2deg); } }
        @keyframes twinkle { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } }
        .animate-twinkle { animation: twinkle 3s ease-in-out infinite; }

        /* The Glass Panel Main Container */
        .glass-panel {
            background: var(--card);
            border: 1.5px solid var(--card-b);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 30px;
            width: 95%; /* Wider layout */
            max-width: 1400px; /* Increased from 1280px */
            box-shadow: 0 24px 64px -16px rgba(38, 94, 155, 0.18), 0 0 0 4px rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 48px);
        }

        h1, h2, h3 { font-family: 'Orbitron', sans-serif; }
        h1 { color: var(--k-blue-d); font-weight: 800; font-size: 1.6rem; letter-spacing: -0.02em; }
        
        button.btn-main {
            background: linear-gradient(180deg, #F9C013 0%, #E5AB00 100%);
            color: #5A3F00;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: none;
            padding: 16px 24px;
            border-radius: 1.2rem;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 7px 0 #B28400, 0 16px 28px -8px rgba(249, 192, 19, 0.45);
        }
        button.btn-main:hover { transform: translateY(-2px); box-shadow: 0 9px 0 #B28400, 0 20px 36px -8px rgba(249, 192, 19, 0.5); }
        button.btn-main:active { transform: translateY(7px); box-shadow: 0 0px 0 #B28400, 0 6px 12px -4px rgba(249, 192, 19, 0.3); }
        button.btn-main:disabled { opacity:.55; cursor:not-allowed; transform:none; box-shadow:none; }

        .btn-outline {
            background: rgba(255, 255, 255, 0.8);
            color: var(--k-blue-d);
            border: 2px solid rgba(38, 94, 155, 0.18);
            font-weight: 700;
            padding: 10px 18px;
            border-radius: 1rem;
            transition: all 0.15s;
        }
        .btn-outline:hover { background: #eff6ff; border-color: var(--k-blue); transform: translateY(-2px); }
        .btn-outline.active { background: linear-gradient(135deg, var(--k-blue), var(--k-blue-d)); color: white; border-color: var(--k-blue-d); }
        .challenge-progress { display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
        .progress-step {
            width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center;
            border:2px solid rgba(38,94,155,.2); background:#fff; color:var(--muted); font-weight:900;
        }
        .progress-step.active { background:var(--k-blue); color:#fff; border-color:var(--k-blue-d); transform:scale(1.08); }
        .progress-step.passed { background:#dcfce7; color:#15803d; border-color:#86efac; }
        .progress-step.failed { background:#fee2e2; color:#b91c1c; border-color:#fca5a5; }
        .progress-step.pending { opacity:.58; }
        .result-card { max-width:620px; width:calc(100% - 32px); }
        .result-level {
            padding:14px; border-radius:14px; background:#eff6ff; color:var(--k-blue-d);
            font-family:'Orbitron',sans-serif; font-size:1.2rem; font-weight:900;
        }

        /* Workspace Areas */
        .workspace-panel {
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid rgba(38, 94, 155, 0.15);
            border-radius: 1.5rem;
            box-shadow: inset 0 2px 10px rgba(38, 94, 155, 0.03);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .panel-header {
            background: rgba(38, 94, 155, 0.06);
            border-bottom: 1.5px solid rgba(38, 94, 155, 0.12);
            padding: 12px 16px;
            font-weight: 800;
            color: var(--k-blue-d);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Canvas Area */
        .canvas-wrapper {
            background: #0f172a; /* Keep space dark for the game */
            border-radius: 1.2rem;
            border: 3px solid var(--k-blue);
            box-shadow: 0 10px 30px rgba(38, 94, 155, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.15) 1px, transparent 1px),
                radial-gradient(circle at 80% 40%, rgba(255,255,255,0.15) 2px, transparent 2px);
        }

        .game-canvas {
            width: 520px;
            height: 520px;
            position: relative;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            flex-shrink: 0;
        }
        
        /* Path visual - Connected Path */
        .cell-path {
            --track: #facc15;
            background: transparent;
        }
        .path-core, .path-arm {
            position: absolute; background: var(--track); box-shadow: 0 0 9px rgba(250,204,21,.42);
        }
        .path-core { width: 22px; height: 22px; left: 21.5px; top: 21.5px; border-radius: 7px; }
        .path-arm.up { width: 22px; height: 33px; left: 21.5px; top: 0; }
        .path-arm.down { width: 22px; height: 33px; left: 21.5px; bottom: 0; }
        .path-arm.left { width: 33px; height: 22px; left: 0; top: 21.5px; }
        .path-arm.right { width: 33px; height: 22px; right: 0; top: 21.5px; }
        .path-arm.up, .path-arm.down { border-radius: 7px 7px 0 0; }
        .path-arm.left, .path-arm.right { border-radius: 7px 0 0 7px; }
        .cell-path::after {
            content: ""; position: absolute; width: 5px; height: 5px; border-radius: 50%;
            background: rgba(255,255,255,.75); left: 30px; top: 30px;
        }

        .robot {
            position: absolute;
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 20; /* High z-index to stay above path */
        }
        .robot img {
            width: 140%; /* Enlarge astronaut */
            height: 140%;
            object-fit: contain;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.8));
        }

        .target {
            position: absolute;
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10; /* High z-index to stay above path */
            animation: pulseStar 1.5s infinite alternate;
        }
        
        .target img {
            width: 200%;
            height: 200%;
            object-fit: contain;
            filter: drop-shadow(0 0 16px rgba(249, 192, 19, 0.95));
        }
        
        @keyframes pulseStar { 
            0% { transform: scale(0.95); } 
            100% { transform: scale(1.1); } 
        }

        /* Blocks Styling */
        .scratch-block {
            color: white;
            padding: 10px 14px;
            border-radius: 6px;
            font-weight: 700;
            cursor: grab;
            margin-bottom: 4px;
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.2);
            filter: drop-shadow(0 2px 3px rgba(38,94,155,0.3));
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            width: max-content;
        }
        .scratch-block:active { cursor: grabbing; transform: translateY(2px); }
        .block-maju, .block-kanan, .block-kiri { background-color: var(--k-blue); }
        
        /* C-Blocks */
        .block-loop, .block-if, .block-ifelse {
            background-color: transparent !important; box-shadow: none !important; padding: 0 !important;
            display: flex; flex-direction: column; align-items: stretch; margin-bottom: 4px; cursor: default;
            filter: drop-shadow(0 3px 3px rgba(38,94,155,0.3));
            width: max-content; min-width: 205px;
        }
        
        .block-loop .loop-top { background-color: var(--k-green); }
        .block-loop .loop-body { border-left-color: var(--k-green); }
        .block-loop .loop-bottom { background-color: var(--k-green); }
        
        .block-if .loop-top, .block-ifelse .loop-top { background-color: #8b5cf6; } /* Purple for logic */
        .block-if .loop-body, .block-ifelse .if-body, .block-ifelse .else-body { border-left-color: #8b5cf6; }
        .block-if .loop-bottom, .block-ifelse .loop-bottom { background-color: #8b5cf6; }
        .block-ifelse .loop-middle { background-color: #8b5cf6; }

        .loop-top {
            padding: 10px 14px; border-radius: 6px 6px 6px 0; color: white; font-weight: 700; cursor: grab;
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.3); min-width: 205px;
        }
        .loop-body, .if-body, .else-body {
            border-left-width: 16px; border-left-style: solid; background-color: transparent; min-height: 35px;
            min-width: 205px; padding: 6px 0 6px 12px; display: flex; flex-direction: column;
            align-items: flex-start; gap: 3px;
        }
        .loop-bottom { height: 22px; border-radius: 0 6px 6px 6px; min-width: 205px; }
        .loop-middle { padding: 8px 14px; color: white; font-weight: 700; cursor: grab; border-radius: 0 6px 6px 0; min-width: 205px; }
        .condition-select {
            color: #334155; background: #fff; border: 0; border-radius: 5px; padding: 2px 24px 2px 7px;
            font: inherit; font-size: .82rem; cursor: pointer; box-shadow: inset 0 0 0 1px rgba(15,23,42,.16);
        }
        .block-counter {
            margin-left: auto; padding: 5px 10px; border-radius: 999px; background: rgba(255,255,255,.2);
            font-size: .78rem; white-space: nowrap;
        }
        .block-counter.limit-hit { background: #fee2e2; color: #b91c1c; }

        .sortable-ghost { opacity: 0.4; border: 2px dashed var(--k-blue) !important; border-radius: 6px; }
        .sortable-drag { cursor: grabbing !important; }
        
        /* Trash */
        #trash-zone { transition: all 0.2s; border: 2px dashed rgba(38, 94, 155, 0.3); background: rgba(38, 94, 155, 0.05); }
        #trash-zone.drag-over { background-color: rgba(239, 68, 68, 0.1); border-color: #ef4444; color: #ef4444; }

        /* Scrollbars */
        .scroll-area::-webkit-scrollbar { width: 8px; }
        .scroll-area::-webkit-scrollbar-track { background: rgba(38,94,155,0.05); border-radius: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: rgba(38,94,155,0.2); border-radius: 4px; }
        
        .status-box {
            padding: 16px;
            border-radius: 1rem;
            font-weight: 800;
            text-align: center;
            font-size: 1.1rem;
            border: 2px solid transparent;
            margin-top: 12px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            body { display:block; padding:12px; overflow-x:hidden; }
            .glass-panel {
                width:calc(100vw - 24px); max-width:calc(100vw - 24px); margin:0 auto;
                height:auto; min-height:calc(100vh - 24px); padding:18px; border-radius:1.4rem;
            }
            .mission-header { flex-direction:column; align-items:flex-start; gap:14px; }
            .challenge-progress { justify-content:flex-start; }
            .mission-layout { flex-direction:column; overflow:visible; }
            .mission-layout > * { min-width:0; }
            .canvas-column, .toolbox-panel, .answer-workspace { width:100% !important; min-width:0; flex:none !important; }
            .canvas-column #lvl-desc { height:auto; min-height:1.5rem; }
            .canvas-wrapper { min-height:550px; }
            .toolbox-panel { min-height:520px; }
            .answer-workspace { min-height:430px; }
        }

        @media (max-width: 600px) {
            .glass-panel { padding:14px; }
            h1 { font-size:1.15rem; }
            .progress-step { width:32px; height:32px; }
            .canvas-wrapper { min-height:330px; padding:0; }
            .game-canvas { transform:scale(.58); transform-origin:center; }
            .answer-actions { display:grid; grid-template-columns:minmax(0,1fr); }
            .answer-actions #submit-btn {
                min-width:0; width:100%; padding:14px 6px; font-size:.7rem; letter-spacing:.02em;
            }
            .answer-actions button[aria-label="Reset posisi astronot"] { grid-column:1 / -1; width:100%; }
        }
    </style>
</head>
<body>

    <!-- Intro Modal Overlay -->
    <div id="intro-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900 bg-opacity-75 backdrop-filter backdrop-blur-sm transition-opacity duration-300">

            <img src="https://cdn-web-2.ruangguru.com/landing-pages/assets/2bbf2f56-5da0-45ed-8a96-ccc7d371cf11.png" class="w-32 mx-auto drop-shadow-2xl -mt-2 mb-4" alt="Astronaut">

    </div>

    <!-- Background Elements -->
    <div class="edge-layer">

        <img src="https://cdn-web-2.ruangguru.com/landing-pages/assets/c08a7aed-567f-4e37-988c-1423a5b92643.png" class="edge-planet edge-left" style="top:65%; width:min(28vw,220px); transform:translateX(-30%);" alt="">
        <img src="https://cdn-web-2.ruangguru.com/landing-pages/assets/5f93f855-0466-47b3-ba85-bbaabbad7a2e.png" class="edge-planet edge-right" style="top:20%; width:min(26vw,210px); transform:translateX(30%);" alt="">
        <img src="https://cdn-web-2.ruangguru.com/landing-pages/assets/434fc5cb-e490-4e40-a921-d4519aa8a8a4.png" class="edge-planet edge-right" style="bottom:5%; width:min(30vw,250px);" alt="">
        <img src="https://cdn-web-2.ruangguru.com/landing-pages/assets/61f06160-989d-402e-be1b-eb1891afa86b.png" class="char-float" style="left:8%; top:20%; width:90px; animation:floatY 7s ease-in-out infinite;" alt="">
        <!-- Missing floats from kids.html -->
        <img src="https://cdn-web-2.ruangguru.com/landing-pages/assets/904cb9e9-ecd1-4731-a1ef-fa6a0bd50527.png" class="char-float" style="right:11%; top:52%; width:100px; animation:floatY2 8s ease-in-out infinite 1.5s;" alt="">
        <img src="https://cdn-web-2.ruangguru.com/landing-pages/assets/9b916b05-86ed-4509-aef6-e640606f3542.png" class="char-float" style="left:14%; bottom:8%; width:95px; animation:floatY 6s ease-in-out infinite 0.8s;" alt="">
    </div>

    <!-- Twinkle stars -->
    <div style="position:fixed; top:26%; left:36%; width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.9); pointer-events:none; z-index:-1;" class="animate-twinkle"></div>
    <div style="position:fixed; top:60%; right:30%; width:8px; height:8px; border-radius:50%; background:#fde68a; pointer-events:none; z-index:-1; animation-delay:1.3s;" class="animate-twinkle"></div>
    <div style="position:fixed; top:14%; right:44%; width:6px; height:6px; border-radius:50%; background:#bfdbfe; pointer-events:none; z-index:-1; animation-delay:0.7s;" class="animate-twinkle"></div>

    <!-- Main Container -->
    <div class="glass-panel">
        
        <!-- Header Controls -->
        <div class="mission-header flex justify-between items-center mb-6">
            <h1 class="flex items-center gap-3 m-0 text-2xl">
                <i class="fa-solid fa-rocket text-[var(--k-yellow)]"></i> Kalananti <span>Space Mission</span>
            </h1>
            <div class="challenge-progress" aria-label="Progres tujuh tantangan">
                <span class="progress-step pending" id="step-1">1</span>
                <span class="progress-step pending" id="step-2">2</span>
                <span class="progress-step pending" id="step-3">3</span>
                <span class="progress-step active" id="step-4">4</span>
                <span class="progress-step pending" id="step-5">5</span>
                <span class="progress-step pending" id="step-6">6</span>
                <span class="progress-step pending" id="step-7">7</span>

        <!-- 3 Columns Layout -->
        <div class="mission-layout flex-1 flex gap-6 overflow-hidden">
            
            <!-- Column 1: Canvas (Left) -->
            <div class="canvas-column flex flex-col flex-[1.6]">

                    <h2 id="lvl-title" class="text-xl font-bold text-[var(--k-blue-d)]">Soal 4</h2>

                        <!-- Path layer container to keep paths below robot/target -->

                        <div id="target" class="target">

                    <button onclick="resetCanvas(true)" aria-label="Reset posisi astronot" class="btn-main !bg-white !text-[var(--k-blue-d)] !shadow-none border-2 border-[var(--k-blue-d)] flex-none px-6" style="background: white;"><i class="fa-solid fa-rotate-right"></i></button>

                    <div class="scratch-block block-loop" data-type="repeat_until">

                        <div class="loop-bottom"></div>

                            <select class="condition-select" aria-label="Arah kondisi">
                                <option value="ahead">depan</option><option value="left">kiri</option><option value="right">kanan</option>
                            </select>
                        </div>
                        <div class="loop-body if-body"></div>

    <script>
        function closeIntro() {
            const modal = document.getElementById('intro-modal');
            modal.style.opacity = '0';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }

        // --- GAME ENGINE ---
        const CELL_SIZE = 65; 
        const GRID_SIZE = 8;
        
        const levels = {
            1: {
                id: 1, title: "Soal 1 (Level 1)", desc: "Misi mudah: Bawa astronot maju lurus sampai ke roket.",
                start: {x: 1, y: 4, dir: 1},
                target: {x: 6, y: 4},
                path: [
                    {x:1,y:4},{x:2,y:4},{x:3,y:4},{x:4,y:4},{x:5,y:4},{x:6,y:4}
                ],
                allowed: ['maju', 'kanan', 'kiri', 'repeat_until'], requiredTypes: ['repeat_until'], blockLimit: 2
            },
            2: {
                id: 2, title: "Soal 2 (Level 2)", desc: "Misi mudah: Naiki jalan tangga menuju roket.",
                start: {x: 1, y: 6, dir: 1},
                target: {x: 5, y: 2},
                path: [
                    {x:1,y:6},{x:2,y:6},{x:2,y:5},{x:3,y:5},{x:3,y:4},{x:4,y:4},
                    {x:4,y:3},{x:5,y:3},{x:5,y:2},{x:6,y:2},{x:6,y:1},{x:7,y:1}
                ],
                allowed: ['maju', 'kanan', 'kiri', 'repeat_until'], requiredTypes: ['repeat_until'], blockLimit: 5
            },
            3: {
                id: 3, title: "Soal 3 (Level 3)", desc: "Misi mudah: Maju, lalu belok untuk mencapai roket.",
                start: {x: 3, y: 6, dir: 1},
                target: {x: 5, y: 1},
                path: [
                    {x:3,y:6},{x:4,y:6},{x:5,y:6},{x:5,y:5},{x:5,y:4},{x:5,y:3},{x:5,y:2},{x:5,y:1}
                ],
                allowed: ['maju', 'kanan', 'kiri', 'repeat_until'], requiredTypes: ['repeat_until'], blockLimit: 5
            },
            4: {
                id: 4, title: "Soal 4 (Level 4)", desc: "Misi menengah: Ikuti jalan yang berliku. Gunakan blok IF di dalam Ulangi.",
                start: {x: 1, y: 2, dir: 1}, // dir 1=Right
                target: {x: 3, y: 4},
                path: [

            5: {

                path: [
                    {x:1,y:6},{x:2,y:6},{x:3,y:6},{x:3,y:5},{x:3,y:4},{x:2,y:4},{x:1,y:4},
                    {x:1,y:3},{x:1,y:2},{x:2,y:2},{x:3,y:2},{x:4,y:2},{x:4,y:3},{x:5,y:3},

                ],
                allowed: ['maju', 'kanan', 'kiri', 'repeat_until', 'if_ahead'], requiredTypes: ['repeat_until', 'if_ahead'], blockLimit: 9
            },
            6: {
                id: 6, title: "Soal 6 (Level 6)", desc: "Misi sulit: Kali ini ada percabangan. Gunakan blok Jika / Jika Tidak.",
                start: {x: 5, y: 6, dir: 1},
                target: {x: 0, y: 3},
                path: [
                    {x:0,y:3},{x:1,y:3},{x:2,y:3},{x:3,y:3},{x:4,y:3},{x:5,y:3},{x:6,y:3},
                    {x:1,y:4},{x:1,y:5},{x:1,y:6},{x:2,y:6},{x:3,y:6},
                    {x:3,y:4},{x:3,y:5},{x:4,y:5},{x:5,y:5},{x:5,y:4},{x:5,y:6},{x:6,y:6},
                    {x:2,y:1},{x:2,y:2},{x:3,y:1},{x:4,y:1},{x:5,y:1}
                ],
                allowed: ['maju', 'kanan', 'kiri', 'repeat_until', 'if_ahead', 'ifelse_ahead'], requiredTypes: ['repeat_until', 'ifelse_ahead'], blockLimit: 6
            },
            7: {
                id: 7, title: "Soal 7 (Level 7)", desc: "Misi tersulit: Tantangan labirin terakhir. Manfaatkan blok IF-ELSE dengan baik.",
                start: {x: 1, y: 6, dir: 1},
                target: {x: 4, y: 1},
                path: [
                    {x:1,y:6},{x:2,y:6},{x:3,y:6},{x:4,y:6},{x:1,y:5},{x:1,y:4},{x:1,y:3},
                    {x:1,y:2},{x:1,y:1},{x:2,y:1},{x:2,y:2},{x:2,y:4},{x:3,y:4},{x:4,y:4},
                    {x:5,y:4},{x:6,y:4},{x:6,y:5},{x:6,y:6},{x:3,y:5},{x:3,y:6},
                    {x:4,y:3},{x:4,y:2},{x:4,y:1},{x:5,y:2},{x:6,y:2}
                ],
                allowed: ['maju', 'kanan', 'kiri', 'repeat_until', 'if_ahead', 'ifelse_ahead'], requiredTypes: ['repeat_until', 'ifelse_ahead'], blockLimit: 9
            }
        };

        let currentLvl = 4;
        let robotState = {x: 0, y: 0, dir: 0};
        let challengeSession = null;
        let submissionLocked = false;

        const adaptiveState = {
            assessmentId: 'stage2-scratch-v1',
            module: 'Scratch',
            currentDifficulty: 4,
            challengeTrail: [],
            passedDifficulties: [],
            failedDifficulties: [],
            highestConfirmedMastery: null,
            confirmationPending: false,
            automaticPlacement: null,
            lv3Candidate: false,
            lv3CandidateEvidence: {},
            reviewFlags: [],
            completed: false
        };

        function createChallengeSession(isConfirmation = false) {
            challengeSession = {
                challengeId: `scratch-d${currentLvl}-${isConfirmation ? 'confirmation' : 'primary'}`,
                difficulty: currentLvl,
                isConfirmation,
                startedAt: Date.now(),
                runCount: 0,
                resetCount: 0,
                hintUsed: false,
                submissionAttemptCount: 0,
                firstSubmissionCorrect: null
            };
        }

        function updateProgress() {
            for (let n = 1; n <= 7; n++) {
                const step = document.getElementById(`step-${n}`);
                step.className = 'progress-step';
                if (n === currentLvl && !adaptiveState.completed) step.classList.add('active');
                else if (adaptiveState.passedDifficulties.includes(n)) step.classList.add('passed');
                else if (adaptiveState.failedDifficulties.includes(n)) step.classList.add('failed');
                else step.classList.add('pending');
            }
        }

        function readStage1Prerequisites() {
            const candidates = [
                window.placementTestState,
                window.PLACEMENT_TEST_STATE
            ].filter(Boolean);
            try {
                const stored = JSON.parse(localStorage.getItem('pt_state') || 'null');
                if (stored) candidates.push(stored);
            } catch (error) {
                console.warn('Stage 1 state tidak dapat dibaca.', error);
            }
            const source = candidates[0] || {};
            return {
                stage1APerfect: source.stage1APerfect === true,
                stage1BPerfect: source.stage1BPerfect === true,
                assignedModule: source.assignedModule || 'Scratch',
                potentialModule: source.potentialModule || ''
            };
        }
        
        function initGrid() {
            const pathLayer = document.getElementById('path-layer');
            pathLayer.innerHTML = ''; // clear old paths
            
            const lvl = levels[currentLvl];
            lvl.path.forEach(p => {
                const pathEl = document.createElement('div');
                pathEl.className = 'cell-path absolute';
                pathEl.style.width = CELL_SIZE + 'px';
                pathEl.style.height = CELL_SIZE + 'px';
                pathEl.style.left = (p.x * CELL_SIZE) + 'px';
                pathEl.style.top = (p.y * CELL_SIZE) + 'px';
                pathEl.innerHTML = '<span class="path-core"></span>';
                const directions = [
                    ['up', 0, -1], ['right', 1, 0], ['down', 0, 1], ['left', -1, 0]
                ];
                directions.forEach(([name, dx, dy]) => {
                    if (lvl.path.some(other => other.x === p.x + dx && other.y === p.y + dy)) {
                        pathEl.insertAdjacentHTML('beforeend', `<span class="path-arm ${name}"></span>`);
                    }
                });
                pathLayer.appendChild(pathEl);
            });
        }
        
        function updateRobotVisuals() {
            const r = document.getElementById('robot');
            r.style.left = (robotState.x * CELL_SIZE) + 'px';
            r.style.top = (robotState.y * CELL_SIZE) + 'px';
            r.style.transform = `rotate(${robotState.dir * 90}deg)`;
        }
        
        function loadLevel(num) {
            currentLvl = num;
            adaptiveState.currentDifficulty = num;
            const lvl = levels[num];
            const confirmationLabel = adaptiveState.confirmationPending && num === 7 ? ' — Konfirmasi' : '';
            document.getElementById('lvl-title').innerText = lvl.title + confirmationLabel;
            document.getElementById('lvl-desc').innerText = lvl.desc;
            updateProgress();
            
            clearWorkspace();
            
            Array.from(document.getElementById('toolbox').children).forEach(block => {
                const type = block.getAttribute('data-type');
                if(type) {
                    block.style.display = lvl.allowed.includes(type) ? 'flex' : 'none';
                }
            });
            
            const t = document.getElementById('target');
            t.style.left = (lvl.target.x * CELL_SIZE) + 'px';
            t.style.top = (lvl.target.y * CELL_SIZE) + 'px';
            
            initGrid();
            resetCanvas();
            createChallengeSession(adaptiveState.confirmationPending && num === 7);
            submissionLocked = false;
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerHTML = '<i class="fa-solid fa-play"></i> Jalankan &amp; Periksa';
        }

        function clearWorkspace() {
            document.getElementById('workspace').innerHTML = '';
            document.getElementById('status-msg').classList.add('hidden');
            updateBlockCounter();
        }

        function countUsedBlocks() {
            return workspaceEl.querySelectorAll('.scratch-block[data-type]').length;
        }

        function updateBlockCounter() {
            const counter = document.getElementById('block-counter');
            if (!counter || !levels[currentLvl]) return;
            const used = countUsedBlocks();
            const limit = levels[currentLvl].blockLimit;
            counter.textContent = `${used} / ${limit} blok`;
            counter.classList.toggle('limit-hit', used >= limit);
        }

        function prepareNestedBlock(block) {
            if (!block || block.dataset.nestedReady === 'true') return;
            const type = block.dataset.type;
            if (type === 'repeat_until' || type === 'if_ahead') initNestedSortable(block.querySelector('.loop-body'));
            if (type === 'ifelse_ahead') {
                initNestedSortable(block.querySelector('.if-body'));
                initNestedSortable(block.querySelector('.else-body'));
            }
            block.dataset.nestedReady = 'true';
        }

        function validateBlockLimit(evt) {
            const limit = levels[currentLvl].blockLimit;
            if (countUsedBlocks() <= limit) {
                prepareNestedBlock(evt.item);
                updateBlockCounter();
                return;
            }
            evt.item.remove();
            updateBlockCounter();
            const msg = document.getElementById('status-msg');
            msg.classList.remove('hidden');
            msg.textContent = `Batas misi ini ${limit} blok. Hapus satu blok sebelum menambah yang baru.`;
            msg.style.borderColor = "#ef4444"; msg.style.color = "#ef4444"; msg.style.background = "rgba(239,68,68,.1)";
        }
        
        function resetCanvas(isManual = false) {
            if (isManual && challengeSession) challengeSession.resetCount += 1;
            robotState = { ...levels[currentLvl].start };
            document.getElementById('status-msg').classList.add('hidden');
            updateRobotVisuals();
        }

        // --- SORTABLE JS (DRAG & DROP) ---
        const toolboxEl = document.getElementById('toolbox');
        const workspaceEl = document.getElementById('workspace');
        const trashEl = document.getElementById('trash-zone');
        
        new Sortable(toolboxEl, {
            group: { name: 'blocks', pull: 'clone', put: false },
            sort: false,
            animation: 150,
            onClone: function () {}
        });
        
        new Sortable(workspaceEl, {
            group: 'blocks', animation: 150, emptyInsertThreshold: 20,
            onAdd: validateBlockLimit, onSort: updateBlockCounter
        });
        
        new Sortable(trashEl, {
            group: 'blocks',
            onAdd: function (evt) { evt.item.remove(); updateBlockCounter(); }
        });
        
        function initNestedSortable(el) {
            if (!el || el.dataset.sortableReady === 'true') return;
            new Sortable(el, {
                group: 'blocks', animation: 150, fallbackOnBody: true, swapThreshold: 0.65,
                onAdd: validateBlockLimit, onSort: updateBlockCounter
            });
            el.dataset.sortableReady = 'true';
        }

        // --- EXECUTION ENGINE ---
        function parseBlocks(container) {
            let instructions = [];
            Array.from(container.children).forEach(block => {
                if(block.classList.contains('sortable-ghost')) return;
                const type = block.getAttribute('data-type');
                
                if (type === 'repeat_until') {
                    instructions.push({ type: 'repeat_until', inner: parseBlocks(block.querySelector('.loop-body')) });
                } else if (type === 'if_ahead') {
                    instructions.push({
                        type: 'if_ahead',
                        condition: block.querySelector('.condition-select')?.value || 'ahead',
                        inner: parseBlocks(block.querySelector('.loop-body'))
                    });
                } else if (type === 'ifelse_ahead') {
                    instructions.push({ 
                        type: 'ifelse_ahead',
                        condition: block.querySelector('.condition-select')?.value || 'ahead',
                        ifInner: parseBlocks(block.querySelector('.if-body')),
                        elseInner: parseBlocks(block.querySelector('.else-body'))
                    });
                } else if (type) {
                    instructions.push({ type });
                }
            });
            return instructions;
        }
        
        const delay = ms => new Promise(res => setTimeout(res, ms));
        
        function hasPath(condition = 'ahead') {
            let {x, y, dir} = robotState;
            if (condition === 'left') dir = (dir + 3) % 4;
            if (condition === 'right') dir = (dir + 1) % 4;
            if (dir === 0) y--;
            else if (dir === 1) x++;
            else if (dir === 2) y++;
            else if (dir === 3) x--;
            
            const lvl = levels[currentLvl];
            return lvl.path.some(p => p.x === x && p.y === y);
        }

        async function executeInstructions(instructions) {
            const lvl = levels[currentLvl];
            for (let inst of instructions) {
                if (robotState.x === lvl.target.x && robotState.y === lvl.target.y) return true;

                if (inst.type === 'maju') {
                    let {x, y, dir} = robotState;
                    if (dir === 0) y--; else if (dir === 1) x++; else if (dir === 2) y++; else if (dir === 3) x--;
                    
                    if(x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE || !lvl.path.some(p => p.x === x && p.y === y)) {
                        robotState.x = x; robotState.y = y; updateRobotVisuals(); return false;
                    }
                    robotState.x = x; robotState.y = y; updateRobotVisuals(); await delay(400);
                } else if (inst.type === 'kanan') {
                    robotState.dir = (robotState.dir + 1) % 4; updateRobotVisuals(); await delay(300);
                } else if (inst.type === 'kiri') {
                    robotState.dir = (robotState.dir + 3) % 4; updateRobotVisuals(); await delay(300);
                } else if (inst.type === 'repeat_until') {
                    let maxIter = 50;
                    while(robotState.x !== lvl.target.x || robotState.y !== lvl.target.y) {
                        if (maxIter-- < 0) return false;
                        if(inst.inner.length > 0) {
                            let success = await executeInstructions(inst.inner);
                            if(!success) return false;
                        } else { return false; }
                        if (robotState.x === lvl.target.x && robotState.y === lvl.target.y) break;
                    }
                } else if (inst.type === 'if_ahead') {
                    if (hasPath(inst.condition)) {
                        let success = await executeInstructions(inst.inner);
                        if (!success) return false;
                    }
                } else if (inst.type === 'ifelse_ahead') {
                    if (hasPath(inst.condition)) {
                        let success = await executeInstructions(inst.ifInner);
                        if (!success) return false;
                    } else {
                        let success = await executeInstructions(inst.elseInner);
                        if (!success) return false;
                    }
                }
            }
            return true;
        }

        function flattenInstructionTypes(instructions) {
            const types = [];
            instructions.forEach(inst => {
                types.push(inst.type);
                if (inst.inner) types.push(...flattenInstructionTypes(inst.inner));
                if (inst.ifInner) types.push(...flattenInstructionTypes(inst.ifInner));
                if (inst.elseInner) types.push(...flattenInstructionTypes(inst.elseInner));
            });
            return types;
        }

        function showStatus(kind, html) {
            const msg = document.getElementById('status-msg');
            const styles = {
                error: ['#ef4444', 'rgba(239,68,68,.1)'],
                success: ['#10b981', 'rgba(16,185,129,.1)'],
                warning: ['#f59e0b', 'rgba(245,158,11,.1)'],
                info: ['#2563eb', 'rgba(37,99,235,.1)']
            };
            const [color, background] = styles[kind] || styles.info;
            msg.innerHTML = html;
            msg.style.borderColor = color;
            msg.style.color = color;
            msg.style.background = background;
            msg.classList.remove('hidden');
        }

        async function runCode(options = {}) {
            const isSubmission = options.isSubmission === true;
            if (submissionLocked && !isSubmission) return { correct: false, technicalError: false };
            resetCanvas();
            const instructions = parseBlocks(workspaceEl);
            if (challengeSession) challengeSession.runCount += 1;
            if (instructions.length === 0) {
                showStatus('warning', "<i class='fa-solid fa-circle-exclamation'></i> Susun blok kode terlebih dahulu.");
                return { correct: false, technicalError: false, empty: true };
            }

            const lvl = levels[currentLvl];
            try {
                const executionSucceeded = await executeInstructions(instructions);
                const targetReached = robotState.x === lvl.target.x && robotState.y === lvl.target.y;
                const usedTypes = flattenInstructionTypes(instructions);
                const requiredBlocksUsed = lvl.requiredTypes.every(type => usedTypes.includes(type));
                const validationChecks = {
                    targetReached,
                    requiredBlocksUsed,
                    blockLimitRespected: countUsedBlocks() <= lvl.blockLimit
                };
                const correct = executionSucceeded && Object.values(validationChecks).every(Boolean);

                if (correct) {
                    showStatus('success', `<i class="fa-solid fa-check-circle"></i> ${isSubmission ? 'Jawaban benar!' : 'Program berhasil dijalankan.'}`);
                } else if (!executionSucceeded) {
                    showStatus('error', "<i class='fa-solid fa-triangle-exclamation'></i> Astronot keluar jalur. Perbaiki susunan blokmu.");
                } else if (!requiredBlocksUsed) {
                    showStatus('warning', "<i class='fa-solid fa-puzzle-piece'></i> Tujuan tercapai, tetapi blok utama misi belum digunakan.");
                } else {
                    showStatus('warning', "<i class='fa-solid fa-circle-exclamation'></i> Astronot belum mencapai roket.");
                }
                return { correct, technicalError: false, validationChecks };
            } catch (error) {
                console.error('Technical error saat menjalankan challenge:', error);
                showStatus('info', "<i class='fa-solid fa-screwdriver-wrench'></i> Ada kendala teknis. Jawabanmu tidak dinilai salah—silakan coba lagi.");
                return { correct: false, technicalError: true, error: String(error) };
            }
        }

        function addUnique(list, value) {
            if (!list.includes(value)) list.push(value);
        }

        function scheduleChallenge(nextDifficulty, message) {
            submissionLocked = true;
            document.getElementById('submit-btn').disabled = true;
            showStatus('info', message);
            setTimeout(() => loadLevel(nextDifficulty), 1100);
        }

        function recordChallengeResult(outcome) {
            const telemetry = {
                challengeId: challengeSession.challengeId,
                module: adaptiveState.module,
                difficulty: currentLvl,
                confirmation: challengeSession.isConfirmation,
                submissionAttemptCount: challengeSession.submissionAttemptCount,
                firstSubmissionCorrect: challengeSession.firstSubmissionCorrect,
                finalSubmissionCorrect: outcome.correct,
                runCount: challengeSession.runCount,
                resetCount: challengeSession.resetCount,
                hintUsed: challengeSession.hintUsed,
                durationSeconds: Math.max(1, Math.round((Date.now() - challengeSession.startedAt) / 1000)),
                validationChecks: outcome.validationChecks || {},
                technicalError: false
            };
            adaptiveState.challengeTrail.push(telemetry);
            return telemetry;
        }

        function recordTechnicalError(outcome) {
            addUnique(adaptiveState.reviewFlags, 'technical_error_recorded');
            adaptiveState.challengeTrail.push({
                challengeId: challengeSession.challengeId,
                module: adaptiveState.module,
                difficulty: currentLvl,
                confirmation: challengeSession.isConfirmation,
                firstSubmissionCorrect: null,
                finalSubmissionCorrect: null,
                submissionAttemptCount: challengeSession.submissionAttemptCount,
                runCount: challengeSession.runCount,
                resetCount: challengeSession.resetCount,
                hintUsed: challengeSession.hintUsed,
                durationSeconds: Math.max(1, Math.round((Date.now() - challengeSession.startedAt) / 1000)),
                validationChecks: {},
                technicalError: true,
                technicalErrorMessage: outcome.error || 'unknown_error'
            });
        }

        function calculateLv3Candidate(stage1) {
            const upwardFirstPass = [4, 5, 6, 7].every(difficulty =>
                adaptiveState.challengeTrail.some(item =>
                    item.difficulty === difficulty &&
                    item.confirmation === false &&
                    item.firstSubmissionCorrect === true
                )
            );
            const confirmationPassed = adaptiveState.challengeTrail.some(item =>
                item.difficulty === 7 &&
                item.confirmation === true &&
                item.firstSubmissionCorrect === true
            );
            const noTechnicalError = adaptiveState.challengeTrail.every(item => item.technicalError === false);
            adaptiveState.lv3CandidateEvidence = {
                stage1APerfect: stage1.stage1APerfect,
                stage1BPerfect: stage1.stage1BPerfect,
                upwardFirstPass,
                highestConfirmationPassed: confirmationPassed,
                noTechnicalError
            };
            return stage1.stage1APerfect && stage1.stage1BPerfect && upwardFirstPass && confirmationPassed && noTechnicalError;
        }

        function finishAssessment(highestMastery, extraFlag = '') {
            const stage1 = readStage1Prerequisites();
            adaptiveState.highestConfirmedMastery = Math.max(1, highestMastery);
            adaptiveState.automaticPlacement = highestMastery <= 3 ? 'FOUNDATIONAL — Lv1' : 'BASIC — Lv2';
            if (extraFlag) addUnique(adaptiveState.reviewFlags, extraFlag);
            if (highestMastery >= 6) addUnique(adaptiveState.reviewFlags, 'advanced_evidence_recorded');
            if (stage1.assignedModule !== 'Scratch') addUnique(adaptiveState.reviewFlags, 'assessment_module_mismatch');
            adaptiveState.lv3Candidate = highestMastery === 7 && stage1.assignedModule === 'Scratch' && calculateLv3Candidate(stage1);
            adaptiveState.completed = true;
            updateProgress();

            const result = {
                ...adaptiveState,
                assignedModule: stage1.assignedModule,
                potentialModule: stage1.potentialModule,
                completedAt: new Date().toISOString()
            };
            localStorage.setItem('kalananti-stage2-result-v1', JSON.stringify(result));

            document.getElementById('result-summary').textContent =
                `Mastery tertinggi yang terkonfirmasi: Challenge ${adaptiveState.highestConfirmedMastery}.`;
            document.getElementById('result-level').textContent =
                `Starting Level: ${adaptiveState.automaticPlacement}`;
            const special = document.getElementById('result-special');
            if (adaptiveState.lv3Candidate) {
                special.textContent = 'Status khusus: Kandidat EMERGING — Lv3. Level otomatis tetap BASIC — Lv2 dan perlu Stage 3 serta persetujuan Academic Team.';
                special.classList.remove('hidden');
            } else {
                special.classList.add('hidden');
            }
            document.getElementById('result-flags').textContent = adaptiveState.reviewFlags.length
                ? `Catatan review: ${adaptiveState.reviewFlags.join(', ')}`
                : 'Tidak ada catatan review tambahan.';
            const modal = document.getElementById('result-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function routeAfterSubmission(correct) {
            const difficulty = currentLvl;
            if (challengeSession.isConfirmation) {
                adaptiveState.confirmationPending = false;
                finishAssessment(correct ? 7 : 6);
                return;
            }

            if (correct) {
                addUnique(adaptiveState.passedDifficulties, difficulty);
                if (adaptiveState.failedDifficulties.includes(difficulty + 1)) {
                    finishAssessment(difficulty);
                } else if (difficulty === 7) {
                    adaptiveState.confirmationPending = true;
                    scheduleChallenge(7, '<i class="fa-solid fa-shield-check"></i> Hebat! Selesaikan satu konfirmasi terakhir di Challenge 7.');
                } else {
                    scheduleChallenge(difficulty + 1, `<i class="fa-solid fa-arrow-up"></i> Jawaban benar. Lanjut ke Challenge ${difficulty + 1}.`);
                }
                return;
            }

            addUnique(adaptiveState.failedDifficulties, difficulty);
            if (difficulty === 1) {
                finishAssessment(1, 'foundation_support_required');
            } else if (adaptiveState.passedDifficulties.includes(difficulty - 1)) {
                finishAssessment(difficulty - 1);
            } else {
                scheduleChallenge(difficulty - 1, `<i class="fa-solid fa-arrow-down"></i> Kita coba tantangan yang lebih ringan: Challenge ${difficulty - 1}.`);
            }
        }

        async function submitAnswer() {
            if (submissionLocked || adaptiveState.completed) return;
            submissionLocked = true;
            document.getElementById('submit-btn').disabled = true;
            const outcome = await runCode({ isSubmission: true });
            if (outcome.empty) {
                submissionLocked = false;
                document.getElementById('submit-btn').disabled = false;
                return;
            }
            if (outcome.technicalError) {
                recordTechnicalError(outcome);
                submissionLocked = false;
                document.getElementById('submit-btn').disabled = false;
                return;
            }

            challengeSession.submissionAttemptCount += 1;
            if (challengeSession.submissionAttemptCount === 1) {
                challengeSession.firstSubmissionCorrect = outcome.correct;
            }

            if (!outcome.correct && challengeSession.submissionAttemptCount === 1) {
                submissionLocked = false;
                document.getElementById('submit-btn').disabled = false;
                document.getElementById('submit-btn').innerHTML = '<i class="fa-solid fa-play"></i> Kesempatan 2 dari 2';
                showStatus(

            return {
                scores,
                recommendation: leaders.length === 1 ? leaders[0][0] : null,
                leaders: leaders.map(([module]) => module),
                confidence
            };

<script>

    function calculateStage1Placement(stage1A,stage1B){
      const age=Number(stage1A.student?.exactAge||state.student?.exactAge||10),s=stage1A.scores||{},validator=stage1B.scores||{};
      const selectedPillars=stage1B.selectedPillars||[];
      const combinedPillarScores=Object.fromEntries(['logic','creativity','spatial','digital'].map(pillar=>{
        const foundation=(s[pillar]||0)/5;
        const combined=selectedPillars.includes(pillar)?foundation*.55+((validator[pillar]||0)/5)*.45:foundation;
        return [pillar,Number(combined.toFixed(4))];
      }));
      let assignedModule='Scratch',potentialModule='Scratch',fallbackReason='';
      if(age<=7){assignedModule='Scratch Jr';potentialModule='Scratch';if(s.logic===5&&s.creativity===5&&s.digital===5&&validator.logic===5&&validator.creativity===5&&validator.digital===5)assignedModule='Scratch';else fallbackReason='Belum memenuhi kriteria sempurna untuk lompat ke Scratch.';}
      else if(age<=11){potentialModule='Roblox Studio';if(s.logic===5&&s.creativity===5&&s.spatial===5&&s.digital===5&&validator.logic===5&&validator.creativity===5&&validator.spatial===5&&validator.digital===5)assignedModule='Roblox Studio';else fallbackReason='Belum memenuhi kriteria sempurna untuk lompat ke Roblox Studio.';}
      else if(age<=15){potentialModule='Python';if(s.digital<=2)fallbackReason='Digital Literacy perlu diperkuat; menggunakan jalur aman Scratch.';else if(s.logic===5&&validator.logic===5)assignedModule='Python';else if(s.spatial===5&&s.digital>=4&&validator.spatial===5){assignedModule='Roblox Studio';potentialModule='Roblox Studio';}else fallbackReason='Kriteria kesiapan Roblox/Python belum terpenuhi.';}
      const stage1APerfect=stage1A.perfectScore===true,stage1BPerfect=stage1B.perfectScore===true;
      return {combinedPillarScores,readinessScores:{},assignedModule,potentialModule,fallbackReason,reviewFlags:fallbackReason?['age_policy_fallback']:[],stage2AssessmentId:`stage2-${assignedModule.toLowerCase().replace(/\s+/g,'-')}-v1`,stage1APerfect,stage1BPerfect,stage3EligibilityPrerequisites:{stage1APerfect,stage1BPerfect,requiresStage2UpwardPath:true,requiresHighestDifficultyFirstTry:true,requiresPortfolioReview:true},completedAt:new Date().toISOString()};

    function portfolioForm(){

        <div class="field"><label for="sourceLink">Source/editable file (opsional)</label><input id="sourceLink" type="url" placeholder="https://..."></div>

    function getBand(score) {
      const num = score * 100;
      if (num >= 80) return { label: 'Kekuatan Utama', class: 'band-best' };
      if (num >= 65) return { label: 'Berkembang Baik', class: 'band-good' };
      if (num >= 45) return { label: 'Sedang Bertumbuh', class: 'band-growing' };
      return { label: 'Perlu Pendampingan', class: 'band-needs' };
    }

    function getPillarCopy(pillar, band, name, assignedModule) {
      const isStrong = band.label === 'Kekuatan Utama' || band.label === 'Berkembang Baik';
      if (pillar === 'logic') {
        if (isStrong) return `<b>${name} mampu mengenali pola, urutan, atau hubungan sebab-akibat dengan baik.</b> Kemampuan ini menjadi fondasi untuk menyusun instruksi, memecahkan masalah, dan melakukan debugging.`;

        return `<b>${name} masih membutuhkan contoh dan batasan yang jelas ketika mengembangkan ide.</b> Proyek bertahap akan membantu ${name} berani mencoba, memilih, dan mengembangkan idenya sendiri.`;

      return '';

      if (moduleStr === 'Scratch') return 'Menyusun logika proyek, menggabungkan visual dan interaksi, melakukan debugging, serta menjelaskan cara kerja karya digital.';
      if (moduleStr === 'Roblox Studio') return 'Mengembangkan penalaran spasial, logika sistem, desain lingkungan 3D, pengujian, dan pemecahan masalah dalam proyek.';
      if (moduleStr === 'Python') return 'Mengubah masalah menjadi langkah yang terstruktur, menulis dan menguji instruksi berbasis teks, membaca error, serta memperbaiki solusi.';
      return 'Membangun kemampuan problem solving dan logika pemrograman.';
    }

    function getRadarChart(l, c, s, d) {
      const cx = 360, cy = 280, r = 160;
      const pL = `${cx},${cy - r*l}`;
      const pC = `${cx + r*c},${cy}`;
      const pS = `${cx},${cy + r*s}`;
      const pD = `${cx - r*d},${cy}`;
      return `

        <polygon points="${cx},${cy-r} ${cx+r},${cy} ${cx},${cy+r} ${cx-r},${cy}" fill="rgba(255,255,255,0.9)" stroke="#cbd5e1" stroke-width="2"/>
        <polygon points="${cx},${cy-r*0.75} ${cx+r*0.75},${cy} ${cx},${cy+r*0.75} ${cx-r*0.75},${cy}" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,6"/>

    function finalResult(){

        ? `Minat belajar ${esc(name)} belum terkonfirmasi. Untuk sementara, ${esc(assigned)} menjadi langkah awal yang paling sesuai berdasarkan hasil placement.`
        : `${esc(name)} ingin ${interestGoals[interest]}. Karena itu, perjalanan belajarnya diarahkan melalui <strong>${esc(learningPath.name)}</strong>. ${interest===assigned?`Berdasarkan hasil placement, ${esc(assigned)} menjadi modul yang sebaiknya dipelajari sekarang.`:`Untuk menuju tujuan tersebut, ${esc(assigned)} sebaiknya dipelajari lebih dulu agar fondasi codingnya kuat sebelum melanjutkan ke ${esc(interest)}.`}`;

      let whyLearnNow = '', prioritiesHtml = '';

        prioritiesHtml = `<ul><li>Menyusun langkah dalam urutan yang benar.</li><li>Memahami hubungan antara instruksi dan hasil.</li><li>Menggunakan perangkat dan antarmuka dengan lebih mandiri.</li></ul>`;
      } else {
        whyLearnNow = `${esc(name)} sudah siap bergerak dari aktivitas pengenalan menuju pembuatan proyek yang lebih terstruktur. Pembelajaran pada level ini membantu anak mengubah kemampuan yang sudah terlihat menjadi kebiasaan berpikir: merencanakan, mencoba, mengevaluasi hasil, dan memperbaiki proyek.`;
        prioritiesHtml = `<ul><li>Menggabungkan beberapa instruksi menjadi satu alur.</li><li>Merencanakan proyek sebelum mulai membuat.</li><li>Menguji hasil dan melakukan debugging.</li></ul>`;

      }

      const badgeStatus = candidate ? '<span class="rc-badge-status lv3">Status: Kandidat EMERGING — Lv3</span>' : (level === 'FOUNDATIONAL — Lv1' ? '<span class="rc-badge-status">Status: Direkomendasikan untuk membangun fondasi</span>' : '<span class="rc-badge-status">Status: Siap mengembangkan kemampuan melalui proyek</span>');

      shell(`
