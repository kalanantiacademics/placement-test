          <h2 class="rc-section-title">Profil Kemampuan ${esc(name)}</h2>
          <div class="rc-profile-layout">
            <div class="rc-profile-chart">
               ${getRadarChart(scores.logic, scores.creativity, scores.spatial, scores.digital)}
            </div>
            <div class="rc-pillars-compact">
              <div class="rc-pillar-card">
                <div class="rc-pillar-head"><span class="rc-pillar-name">Logika</span><span class="rc-band ${bLog.class}">${bLog.label}</span></div>
                <p>${getPillarCopy('logic', bLog, esc(name), esc(assigned))}</p>
              </div>
              <div class="rc-pillar-card">
                <div class="rc-pillar-head"><span class="rc-pillar-name">Kreativitas</span><span class="rc-band ${bCre.class}">${bCre.label}</span></div>
                <p>${getPillarCopy('creativity', bCre, esc(name), esc(assigned))}</p>
              </div>
              <div class="rc-pillar-card">
                <div class="rc-pillar-head"><span class="rc-pillar-name">Spasial</span><span class="rc-band ${bSpa.class}">${bSpa.label}</span></div>
                <p>${getPillarCopy('spatial', bSpa, esc(name), esc(assigned))}</p>
              </div>
              <div class="rc-pillar-card">
                <div class="rc-pillar-head"><span class="rc-pillar-name">Literasi Digital</span><span class="rc-band ${bDig.class}">${bDig.label}</span></div>
                <p>${getPillarCopy('digital', bDig, esc(name), esc(assigned))}</p>
              </div>
            </div>
          </div>
        </div>

        <div class="rc-grid-2">
          <div class="rc-section rc-bg-blue">
            <h2 class="rc-section-title">Mengapa mulai dari level ini?</h2>
            <p>${whyLearnNow}</p>
            <p style="margin-top:15px; font-weight: 800; color: var(--dark);">Melalui ${esc(assigned)}, ${esc(name)} akan berlatih:</p>
            <p>${getModuleValue(assigned)}</p>
          </div>
          <div class="rc-section rc-bg-yellow">
            <h2 class="rc-section-title">Fokus Perkembangan Awal</h2>
            <div class="rc-priorities">${prioritiesHtml}</div>
          </div>
        </div>

        <div class="rc-section">
          <h2 class="rc-section-title">Learning Path ${esc(name)}</h2>
          <div class="rc-path-name">${esc(learningPath.name)}</div>
          <div class="rc-journey">
            ${learningPath.modules.map((module,index)=>`${index?'<span class="rc-journey-arrow" aria-hidden="true">→</span>':''}<div class="rc-journey-step">${index+1}. ${esc(module)}</div>`).join('')}
          </div>
        </div>

        <div class="rc-section" style="background:#f1faf8; border-color:#a3d9d3;">
          <h2 class="rc-section-title" style="color:#216c65; border-bottom-color:rgba(51,157,157,0.2);">Arah Belajar Berdasarkan Minat</h2>
          <p style="font-size:1.05rem; font-weight:600; color:#1a4d48;">${interestStatement}</p>
        </div>

        <div class="rc-footer-actions">
          <div class="rc-footer-note">
            <strong>${candidate ? 'Opsional: review EMERGING — Lv3' : 'Placement test selesai'}</strong><br>
            Submission ID: <code>${esc(state.submissionId)}</code>. ${candidate ? 'Penempatan BASIC — Lv2 sudah berlaku; portfolio hanya diperlukan jika ingin dipertimbangkan untuk EMERGING — Lv3.' : 'Rekomendasi modul dan level di atas merupakan hasil placement otomatis.'}
          </div>
          <div class="actions">
            <button class="btn btn-secondary" type="button" id="downloadReport">Unduh Laporan JSON</button>
            ${candidate ? '<button class="btn btn-primary" type="button" id="goPortfolio">Kirim Portfolio untuk Review Lv3</button>' : '<button class="btn btn-primary" type="button" id="restart">Selesai / Mulai Ulang</button>'}
          </div>
        </div>
      `);
      
      document.getElementById('downloadReport').onclick=()=>{
        const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download=`placement-${state.submissionId}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
      };

      const portBtn = document.getElementById('goPortfolio');
      if (portBtn) portBtn.onclick = portfolioForm;
      const restartBtn = document.getElementById('restart');
      if (restartBtn) restartBtn.onclick = () => { localStorage.removeItem(STORAGE_KEY); location.reload(); };
    }
    window.addEventListener('message',event=>{
      if(!event.data)return;
      if(event.data.type==='kalananti-stage1a-complete'){
        state._stage1A=event.data.payload;
        save();
        startEmbeddedStage1B(event.data.payload);
      }else if(event.data.type==='kalananti-stage1b-ready'&&state._stage1A){
        document.getElementById('flowFrame')?.contentWindow?.postMessage({type:'kalananti-stage1b-init',payload:state._stage1A},'*');
      }else if(event.data.type==='kalananti-stage1b-complete'&&state._stage1A){
        state.stage1=calculateStage1Placement(state._stage1A,event.data.payload);
        state.stage1.student=state.student;
        delete state._stage1A;
        save();
        startStage2();
      }else if(event.data.type==='kalananti-flat-stage2-complete'){
        state.stage2=event.data.payload;save();startStage3();
      }else if(event.data.type==='kalananti-flat-stage3-complete'){
        state.stage3={...event.data.payload,status:'completed'};save();finalResult();
      }
    });
    function resume(){
      if(!state.student){
        state.student={name:'Dev Kids',exactAge:11,ageRange:'9–11',audienceGroup:'Kids',parentEmail:'dev@kalananti.id',branch:'Online'};
      }
      if(state.screen==='stage1')return startStage1();
      if(state.screen==='stage1-result')return stage1Result();
      if(state.screen==='stage2')return startStage2();
      if(state.screen==='stage2-result')return stage2Result();
      if(state.screen==='stage3-interest')return startStage3();
      if(state.screen==='stage3-portfolio')return portfolioForm();
      return finalResult();
    }
    const pending=JSON.parse(localStorage.getItem('kalananti-kids-flat-pending-v1')||'null');
    if(pending){
      localStorage.removeItem('kalananti-kids-flat-pending-v1');
      window.dispatchEvent(new MessageEvent('message',{data:pending}));
    }else{
      resume();
    }
    }
  </script>
</body>
</html>
